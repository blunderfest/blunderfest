services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: vscode
    volumes:
      - ..:/workspace:cached
      - vscode-server:/home/vscode/.vscode-server
      - ssh-data:/home/vscode/.ssh
      - ~/.gitconfig:/home/vscode/.gitconfig:ro
    command: sleep infinity
    working_dir: /workspace
    user: vscode
    ports:
      - "5173:5173"
      - "8080:8080"

volumes:
  vscode-server:
  ssh-data: